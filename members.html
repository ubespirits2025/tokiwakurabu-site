<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>メンバー紹介</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
  <div class="container">
    <h1>監督・コーチ・選手紹介</h1>
  </div>
</header>

<main class="container">

  <section class="card">
    <h2 class="section-title">スタッフ</h2>

    <div class="member-grid">
      <!-- 監督 -->
      <div class="member-card">
        <div class="member-photo">
          <span class="role-tag">監督</span>
          <img src="images/kantoku.jpg" alt="監督 佐々木 高志">
        </div>
        <div class="member-body">
          <p class="member-name">佐々木 高志</p>
          <p class="member-meta">メッセージ：全力で楽しく！</p>
        </div>
      </div>

      <!-- コーチ -->
      <div class="member-card">
        <div class="member-photo">
          <span class="role-tag">コーチ</span>
          <img src="images/coach-1.jpg" alt="コーチ 吉武 正和">
        </div>
        <div class="member-body">
          <p class="member-name">吉武 正和</p>
          <p class="member-meta">担当：コーチ</p>
        </div>
      </div>

      <div class="member-card">
        <div class="member-photo">
          <span class="role-tag">コーチ</span>
          <img src="images/coach-2.jpg" alt="コーチ 海頭 大地">
        </div>
        <div class="member-body">
          <p class="member-name">海頭 大地</p>
          <p class="member-meta">担当：コーチ</p>
        </div>
      </div>
    </div>
  </section>

  <section class="card grade-block">
    <h2 class="section-title">6年生</h2>

    <div class="member-grid">
      <div class="member-card">
        <div class="member-photo">
          <span class="badge">10</span>
          <img src="images/6-10.jpg" alt="海頭 陸翔">
        </div>
        <div class="member-body">
          <p class="member-name">海頭 陸翔</p>
          <p class="member-meta">ポジション：外野手</p>
        </div>
      </div>

      <div class="member-card">
        <div class="member-photo">
          <span class="badge">1</span>
          <img src="images/6-1.jpg" alt="新谷 慶悟">
        </div>
        <div class="member-body">
          <p class="member-name">新谷 慶悟</p>
          <p class="member-meta">ポジション：投手　内野手</p>
        </div>
      </div>

      <div class="member-card">
        <div class="member-photo">
          <span class="badge">2</span>
          <img src="images/6-2.jpg" alt="荒川 晴唯">
        </div>
        <div class="member-body">
          <p class="member-name">荒川 晴唯</p>
          <p class="member-meta">ポジション：捕手　内野手</p>
        </div>
      </div>

      <div class="member-card">
        <div class="member-photo">
          <span class="badge">5</span>
          <img src="images/6-5.jpg" alt="吉武 大和">
        </div>
        <div class="member-body">
          <p class="member-name">吉武 大和</p>
          <p class="member-meta">ポジション：内野手</p>
        </div>
      </div>
    </div>
  </section>

</main>

</body>
</html>

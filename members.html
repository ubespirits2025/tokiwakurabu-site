<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>メンバー紹介</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
  <div class="container">
    <h1>監督・コーチ・選手紹介</h1>
  </div>
</header>

<main class="container">

<section class="card">
<h2>監督</h2>
<p>監督  佐々木　髙志</p>
<p>メッセージ：全力で楽しく！</p>
</section>

<section class="card">
<h2>コーチ</h2>
<p>コーチ  吉武　正和</p>
<p>コーチ  海頭　大地</p>  
</section>
 
<section class="card">
  <h2>6年生</h2>

  <div class="players">
    <div class="player">
      <img src="players/10.jpg" alt="#10 海頭 陸翔">
      <div class="player-meta">
        <span class="number">10</span>
        <span class="name">海頭 陸翔</span>
      </div>
    </div>

    <div class="player">
      <img src="players/1.jpg" alt="#1 新谷 慶悟">
      <div class="player-meta">
        <span class="number">1</span>
        <span class="name">新谷 慶悟</span>
      </div>
    </div>

    <div class="player">
      <img src="players/2.jpg" alt="#2 荒川 晴唯">
      <div class="player-meta">
        <span class="number">2</span>
        <span class="name">荒川 晴唯</span>
      </div>
    </div>

    <div class="player">
      <img src="players/5.jpg" alt="#5 吉武 大和">
      <div class="player-meta">
        <span class="number">5</span>
        <span class="name">吉武 大和</span>
      </div>
    </div>
  </div>
</section>

</main>

</body>
</html>
